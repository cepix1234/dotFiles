# kitty.conf - Generated by Confitty (2026-04-19)
# Place this file at: ~/.config/kitty/kitty.conf
# Reload without restart: Ctrl+Shift+F5  |  Docs: https://sw.kovidgoyal.net/kitty/conf/
# Only settings that differ from Kitty defaults are included.

# --- Fonts ---
font_family Intel One Mono
font_size 10
disable_ligatures cursor

# --- Cursor ---
cursor_blink_interval 0.5
cursor #ffffff
cursor_text_color #1f1f28

# --- Scrollback ---
scrollback_lines 10000

# --- Bell ---
enable_audio_bell no
window_alert_on_bell no
bell_on_tab 

# --- Window Layout ---
window_border_width 1pt
window_padding_width 8
confirm_os_window_close 1

# --- Tab Bar ---
tab_bar_edge top
tab_bar_style hidden
active_tab_foreground #000000
active_tab_background #eeeeee
inactive_tab_foreground #444444
inactive_tab_background #999999

# --- Colors ---
foreground #c0caf5
background #1a1b26
background_opacity 0.98
selection_foreground #1a1b26
selection_background #283457
color0 #15161e
color1 #f7768e
color2 #9ece6a
color3 #e0af68
color4 #7aa2f7
color5 #bb9af7
color6 #7dcfff
color7 #a9b1d6
color8 #414868
color9 #f7768e
color10 #9ece6a
color11 #e0af68
color12 #7aa2f7
color13 #bb9af7
color14 #7dcfff
color15 #c0caf5
url_color #7e9cd8

# --- Advanced ---
shell zsh

# --- Background ---
background_image ~/.config/kitty/back-ground.jpg
background_image_layout scaled
background_tint 0.95
